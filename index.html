<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriTrack — Controle de Calorias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#111827;--bg2:#1f2937;--bg3:#374151;
      --border:#374151;--text:#f9fafb;--muted:#9ca3af;
      --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
      --blue:#3b82f6;--purple:#a855f7;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* NAV */
    .nav{
      background:var(--bg2);border-bottom:1px solid var(--border);
      padding:.9rem 1.5rem;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:100;
    }
    .nav-logo{display:flex;align-items:center;gap:.6rem;font-weight:800;font-size:1.1rem;color:var(--green)}
    .nav-logo span{font-size:1.3rem}
    .nav-date{color:var(--muted);font-size:.82rem}
    .btn{
      border:none;border-radius:8px;padding:.5rem 1rem;font-family:inherit;
      font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .2s;
    }
    .btn:hover{opacity:.85}
    .btn-green{background:var(--green);color:#fff}
    .btn-gray{background:var(--bg3);color:var(--text)}
    .btn-red{background:var(--red);color:#fff}

    /* LAYOUT */
    .page{max-width:1100px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem}

    /* STATS ROW */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center}
    .stat-icon{font-size:1.3rem;margin-bottom:.4rem}
    .stat-num{font-size:1.9rem;font-weight:800;line-height:1}
    .stat-lbl{font-size:.72rem;color:var(--muted);margin-top:.25rem;text-transform:uppercase;letter-spacing:.5px}
    .c-green{color:var(--green)}.c-blue{color:var(--blue)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}

    /* MAIN GRID */
    .main{display:grid;grid-template-columns:1fr 340px;gap:1.2rem;align-items:start}

    /* CARD */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
    .card+.card{margin-top:1.2rem}
    .card-head{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:1rem}

    /* PROGRESS */
    .progress-wrap{display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
    .ring-box{position:relative;width:140px;height:140px;flex-shrink:0}
    .ring-box svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:var(--bg3);stroke-width:14}
    .ring-fg{fill:none;stroke:var(--green);stroke-width:14;stroke-linecap:round;
      stroke-dasharray:376.99;stroke-dashoffset:376.99;transition:stroke-dashoffset .7s ease,stroke .3s}
    .ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%}
    .ring-kcal{font-size:1.7rem;font-weight:800;line-height:1;color:var(--green)}
    .ring-sub{font-size:.7rem;color:var(--muted);margin-top:.15rem}
    .macros{flex:1;min-width:180px}
    .macro{margin-bottom:1rem}
    .macro:last-child{margin-bottom:0}
    .macro-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.35rem}
    .macro-name{color:var(--muted)}
    .macro-val{font-weight:700}
    .mbar{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
    .mbar-fill{height:100%;border-radius:99px;transition:width .6s ease}

    /* WATER */
    .water-row{display:flex;align-items:center;gap:.5rem;margin-top:1.2rem;flex-wrap:wrap}
    .water-lbl{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:.3rem}
    .wcup{font-size:1.2rem;cursor:pointer;opacity:.25;transition:opacity .2s,transform .2s;user-select:none;line-height:1}
    .wcup.filled{opacity:1}
    .wcup:hover{transform:scale(1.2)}

    /* TABS */
    .tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
    .tab{padding:.38rem .9rem;border-radius:99px;border:1px solid var(--border);
      background:none;color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .tab.active{background:var(--green);color:#fff;border-color:var(--green)}

    /* FOOD LIST */
    .food-list{display:flex;flex-direction:column;gap:.5rem;min-height:60px}
    .food-item{
      background:var(--bg3);border-radius:10px;padding:.8rem 1rem;
      display:flex;align-items:center;gap:.8rem;
      animation:fadein .25s ease;
    }
    @keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .food-icon{font-size:1.3rem;width:28px;text-align:center;flex-shrink:0}
    .food-body{flex:1;min-width:0}
    .food-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .food-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem}
    .food-kcal{font-weight:800;color:var(--green);font-size:.9rem;flex-shrink:0}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.2rem .4rem;border-radius:6px;transition:all .2s;flex-shrink:0}
    .del-btn:hover{color:var(--red);background:rgba(239,68,68,.12)}
    .empty{text-align:center;padding:2rem;color:var(--muted)}
    .empty i{font-size:2rem;display:block;margin-bottom:.6rem;opacity:.4}
    .empty p{font-size:.85rem;line-height:1.6}

    /* MEAL GROUP */
    .meal-group{margin-bottom:1rem}
    .meal-group-head{
      display:flex;justify-content:space-between;align-items:center;
      padding:.5rem 0;border-bottom:1px solid var(--border);margin-bottom:.6rem;
    }
    .meal-group-name{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:.85rem}
    .meal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .meal-kcal{font-size:.8rem;color:var(--muted)}

    /* ADD FORM */
    .form-section{}
    .fg{margin-bottom:.85rem}
    .fg label{display:block;font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.5px}
    .fg input,.fg select{
      width:100%;background:var(--bg);border:1px solid var(--border);
      border-radius:9px;padding:.65rem .85rem;color:var(--text);
      font-family:inherit;font-size:.9rem;outline:none;transition:border .2s;
    }
    .fg input:focus,.fg select:focus{border-color:var(--green)}
    .fg input::placeholder{color:var(--border)}
    .fg select option{background:var(--bg2)}
    .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
    .fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem}
    .btn-add-food{
      width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;
      border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;
      font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem;
      transition:all .2s;margin-top:.3rem;
    }
    .btn-add-food:hover{background:#16a34a;transform:translateY(-1px)}

    /* QUICK */
    .quick-grid{display:flex;flex-wrap:wrap;gap:.45rem}
    .qpill{
      background:var(--bg);border:1px solid var(--border);padding:.32rem .75rem;
      border-radius:99px;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--text);
    }
    .qpill:hover{border-color:var(--green);color:var(--green)}

    /* HISTORY */
    .hist-item{display:flex;align-items:center;gap:.8rem;padding:.55rem 0;border-bottom:1px solid var(--border)}
    .hist-item:last-child{border:none}
    .hist-day{font-size:.82rem;font-weight:600;width:90px;flex-shrink:0}
    .hist-bar{flex:1;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
    .hist-fill{height:100%;border-radius:99px;transition:width .6s}
    .hist-val{font-size:.8rem;font-weight:700;width:70px;text-align:right;flex-shrink:0}

    /* MODAL */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .overlay.show{opacity:1;pointer-events:all}
    .modal{
      background:var(--bg2);border:1px solid var(--border);border-radius:16px;
      padding:1.8rem;width:90%;max-width:380px;
      transform:scale(.96);transition:transform .25s;
    }
    .overlay.show .modal{transform:scale(1)}
    .modal-title{font-size:1.1rem;font-weight:800;margin-bottom:1.3rem}
    .modal-actions{display:flex;gap:.7rem;margin-top:.5rem}
    .modal-actions .btn{flex:1;padding:.75rem}

    /* TIPS */
    .tip{
      background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);
      border-radius:10px;padding:.85rem 1rem;display:flex;gap:.6rem;margin-bottom:.7rem;
    }
    .tip:last-child{margin-bottom:0}
    .tip i{color:var(--green);margin-top:.1rem;flex-shrink:0}
    .tip p{font-size:.82rem;color:rgba(255,255,255,.72);line-height:1.6}

    /* TOAST */
    .toast{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);
      background:var(--green);color:#fff;padding:.65rem 1.4rem;border-radius:99px;
      font-size:.85rem;font-weight:600;z-index:300;transition:transform .3s;
      pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}

    @media(max-width:750px){
      .stats{grid-template-columns:1fr 1fr}
      .main{grid-template-columns:1fr}
      .progress-wrap{gap:1.2rem}
    }
    @media(max-width:420px){
      .fg-row,.fg-row3{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><span>🥗</span> NutriTrack</div>
  <span class="nav-date" id="navDate"></span>
  <button class="btn btn-green" onclick="abrirMeta()">&#9881; Meta</button>
</nav>

<div class="page">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-icon">🔥</div>
      <div class="stat-num c-green" id="sConsumed">0</div>
      <div class="stat-lbl">kcal consumidas</div>
    </div>
    <div class="stat">
      <div class="stat-icon">🎯</div>
      <div class="stat-num c-blue" id="sRemaining">0</div>
      <div class="stat-lbl">kcal restantes</div>
    </div>
    <div class="stat">
      <div class="stat-icon">💧</div>
      <div class="stat-num" style="color:#38bdf8" id="sWater">0</div>
      <div class="stat-lbl">copos de água</div>
    </div>
    <div class="stat">
      <div class="stat-icon">🍽️</div>
      <div class="stat-num c-yellow" id="sItems">0</div>
      <div class="stat-lbl">alimentos hoje</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div>

      <!-- PROGRESS CARD -->
      <div class="card">
        <div class="card-head">Progresso do Dia</div>
        <div class="progress-wrap">
          <div class="ring-box">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle class="ring-bg" cx="70" cy="70" r="60"/>
              <circle class="ring-fg" id="ringFg" cx="70" cy="70" r="60"/>
            </svg>
            <div class="ring-text">
              <div class="ring-kcal" id="ringNum">0</div>
              <div class="ring-sub">de <span id="ringMeta">2000</span> kcal</div>
            </div>
          </div>
          <div class="macros">
            <div class="macro">
              <div class="macro-row"><span class="macro-name">Proteínas</span><span class="macro-val c-blue" id="mP">0g / <span id="mPMeta">150</span>g</span></div>
              <div class="mbar"><div class="mbar-fill" id="bP" style="width:0%;background:var(--blue)"></div></div>
            </div>
            <div class="macro">
              <div class="macro-row"><span class="macro-name">Carboidratos</span><span class="macro-val c-yellow" id="mC">0g / <span id="mCMeta">250</span>g</span></div>
              <div class="mbar"><div class="mbar-fill" id="bC" style="width:0%;background:var(--yellow)"></div></div>
            </div>
            <div class="macro">
              <div class="macro-row"><span class="macro-name">Gorduras</span><span class="macro-val" style="color:var(--purple)" id="mG">0g / <span id="mGMeta">65</span>g</span></div>
              <div class="mbar"><div class="mbar-fill" id="bG" style="width:0%;background:var(--purple)"></div></div>
            </div>
          </div>
        </div>
        <div class="water-row">
          <span class="water-lbl">Água:</span>
          <div id="waterCups"></div>
          <span style="font-size:.75rem;color:var(--muted)" id="waterLabel"></span>
        </div>
      </div>

      <!-- LOG CARD -->
      <div class="card">
        <div class="card-head">Registro de Hoje</div>
        <div class="tabs" id="mealTabs">
          <button class="tab active" data-meal="todos">Todos</button>
          <button class="tab" data-meal="cafe">Cafe</button>
          <button class="tab" data-meal="almoco">Almoco</button>
          <button class="tab" data-meal="jantar">Jantar</button>
          <button class="tab" data-meal="lanche">Lanche</button>
        </div>
        <div class="food-list" id="foodList"></div>
      </div>

      <!-- HISTORY CARD -->
      <div class="card">
        <div class="card-head">Historico — Ultimos 7 Dias</div>
        <div id="histList"></div>
      </div>

    </div>

    <!-- RIGHT -->
    <div>

      <!-- ADD CARD -->
      <div class="card">
        <div class="card-head">Adicionar Alimento</div>
        <div class="fg">
          <label>Nome</label>
          <input type="text" id="fNome" placeholder="Ex: Frango grelhado" list="sugestoes" autocomplete="off"/>
          <datalist id="sugestoes"></datalist>
        </div>
        <div class="fg-row">
          <div class="fg">
            <label>Quantidade</label>
            <input type="number" id="fQty" placeholder="100" min="0"/>
          </div>
          <div class="fg">
            <label>Unidade</label>
            <select id="fUnit">
              <option>g</option><option>ml</option><option>unidade</option>
              <option>colher</option><option>xicara</option><option>fatia</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label>Calorias (kcal)</label>
          <input type="number" id="fKcal" placeholder="0" min="0"/>
        </div>
        <div class="fg-row3">
          <div class="fg">
            <label>Proteina (g)</label>
            <input type="number" id="fP" placeholder="0" min="0" step="0.1"/>
          </div>
          <div class="fg">
            <label>Carb (g)</label>
            <input type="number" id="fC" placeholder="0" min="0" step="0.1"/>
          </div>
          <div class="fg">
            <label>Gordura (g)</label>
            <input type="number" id="fG" placeholder="0" min="0" step="0.1"/>
          </div>
        </div>
        <div class="fg">
          <label>Refeicao</label>
          <select id="fMeal">
            <option value="cafe">Cafe da Manha</option>
            <option value="almoco">Almoco</option>
            <option value="jantar">Jantar</option>
            <option value="lanche">Lanche</option>
          </select>
        </div>
        <button class="btn-add-food" onclick="addFood()">
          <i class="fas fa-plus"></i> Adicionar
        </button>
      </div>

      <!-- QUICK ADD -->
      <div class="card">
        <div class="card-head">Adicao Rapida</div>
        <div class="quick-grid" id="quickGrid"></div>
      </div>

      <!-- TIPS -->
      <div class="card">
        <div class="card-head">Dicas</div>
        <div id="tips"></div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL META -->
<div class="overlay" id="overlay" onclick="fecharMeta(event)">
  <div class="modal">
    <div class="modal-title">Configurar Meta Diaria</div>
    <div class="fg"><label>Calorias (kcal)</label><input type="number" id="mKcal" placeholder="2000"/></div>
    <div class="fg"><label>Proteinas (g)</label><input type="number" id="mProt" placeholder="150"/></div>
    <div class="fg"><label>Carboidratos (g)</label><input type="number" id="mCarb" placeholder="250"/></div>
    <div class="fg"><label>Gorduras (g)</label><input type="number" id="mFat" placeholder="65"/></div>
    <div class="fg"><label>Agua (copos 250ml)</label><input type="number" id="mWater" placeholder="8" min="1" max="20"/></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="fecharMeta()">Cancelar</button>
      <button class="btn btn-green" onclick="salvarMeta()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================
// STATE
// ============================
const TODAY = new Date().toISOString().slice(0,10);

let S = {
  meta: {kcal:2000, prot:150, carb:250, fat:65, water:8},
  log: {},      // {[date]: [{id,nome,qty,unit,kcal,prot,carb,fat,meal}]}
  water: {},    // {[date]: number}
  custom: []    // alimentos salvos pelo usuario
};

function load(){
  try { const s = localStorage.getItem('nt2'); if(s) S = JSON.parse(s); } catch(e){}
  if(!S.log[TODAY]) S.log[TODAY] = [];
  if(!S.water[TODAY]) S.water[TODAY] = 0;
}
function save(){ localStorage.setItem('nt2', JSON.stringify(S)); }

// ============================
// QUICK FOODS
// ============================
const QUICK = [
  {n:'Banana',       kcal:89,  p:1.1, c:23,  g:0.3, q:100, u:'g'},
  {n:'Ovo cozido',   kcal:68,  p:5.5, c:0.6, g:4.8, q:1,   u:'unidade'},
  {n:'Frango',       kcal:165, p:31,  c:0,   g:3.6, q:100, u:'g'},
  {n:'Arroz',        kcal:130, p:2.7, c:28,  g:0.3, q:100, u:'g'},
  {n:'Feijao',       kcal:77,  p:5.2, c:14,  g:0.5, q:100, u:'g'},
  {n:'Cafe s/acucar',kcal:2,   p:0.3, c:0,   g:0,   q:1,   u:'xicara'},
  {n:'Maca',         kcal:52,  p:0.3, c:14,  g:0.2, q:1,   u:'unidade'},
  {n:'Pao de forma', kcal:79,  p:2.7, c:15,  g:1,   q:1,   u:'fatia'},
  {n:'Leite',        kcal:61,  p:3.2, c:4.8, g:3.3, q:200, u:'ml'},
  {n:'Whey',         kcal:120, p:24,  c:3,   g:1.5, q:30,  u:'g'},
  {n:'Salada',       kcal:15,  p:1.2, c:2.5, g:0.2, q:100, u:'g'},
  {n:'Iogurte',      kcal:59,  p:3.5, c:4.7, g:3.3, q:100, u:'g'},
  {n:'Batata doce',  kcal:86,  p:1.6, c:20,  g:0.1, q:100, u:'g'},
  {n:'Aveia',        kcal:389, p:17,  c:66,  g:7,   q:40,  u:'g'},
  {n:'Azeite',       kcal:884, p:0,   c:0,   g:100, q:10,  u:'ml'},
];

const MEAL_NAMES = {cafe:'Cafe da Manha',almoco:'Almoco',jantar:'Jantar',lanche:'Lanche'};
const MEAL_COLORS = {cafe:'#f59e0b',almoco:'#22c55e',jantar:'#3b82f6',lanche:'#a855f7'};

const TIPS = [
  'Beber agua antes das refeicoes reduz a ingestao calorica.',
  'Proteinas aumentam a saciedade e ajudam na construcao muscular.',
  'Prefira carboidratos complexos: aveia, batata doce, arroz integral.',
  '30 min de caminhada = aprox. 150 kcal a menos no balanco.',
  'Comer devagar ajuda o cerebro a registrar a saciedade.',
  'Vegetais de folhas verdes tem pouquissimas calorias — abuse!',
  'Evite bebidas com acucar: um refrigerante = ~150 kcal vazias.',
  'Gorduras boas (azeite, abacate, castanhas) sao essenciais.',
];

// ============================
// RENDER
// ============================
let activeMeal = 'todos';

function init(){
  load();
  document.getElementById('navDate').textContent =
    new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  renderQuick();
  renderTips();
  renderWater();
  renderLog();
  renderHistory();
  updateStats();
  setupTabs();
  setupAutofill();
}

function renderQuick(){
  const g = document.getElementById('quickGrid');
  g.innerHTML = QUICK.map(f=>`
    <button class="qpill" onclick="quickAdd('${f.n}')">${f.n}</button>
  `).join('');
}

function renderTips(){
  const el = document.getElementById('tips');
  const picked = [...TIPS].sort(()=>Math.random()-.5).slice(0,3);
  el.innerHTML = picked.map(t=>`<div class="tip"><i class="fas fa-lightbulb"></i><p>${t}</p></div>`).join('');
}

function renderWater(){
  const meta = S.meta.water || 8;
  const cur  = S.water[TODAY] || 0;
  const el   = document.getElementById('waterCups');
  el.innerHTML = '';
  for(let i=0;i<meta;i++){
    const s = document.createElement('span');
    s.className = 'wcup' + (i<cur?' filled':'');
    s.textContent = '💧';
    s.onclick = ()=>toggleWater(i);
    el.appendChild(s);
  }
  document.getElementById('waterLabel').textContent = `${cur}/${meta} copos`;
  document.getElementById('sWater').textContent = cur;
}

function toggleWater(i){
  const cur = S.water[TODAY] || 0;
  S.water[TODAY] = i < cur ? i : i+1;
  save(); renderWater();
}

function renderLog(){
  const el = document.getElementById('foodList');
  const all = S.log[TODAY] || [];
  const foods = activeMeal === 'todos' ? all : all.filter(f=>f.meal===activeMeal);

  if(foods.length === 0){
    el.innerHTML = `<div class="empty"><i class="fas fa-utensils"></i><p>Nenhum alimento${activeMeal!=='todos'?' nesta refeicao':''} ainda.<br/>Adicione pelo formulario ao lado!</p></div>`;
    return;
  }

  if(activeMeal === 'todos'){
    el.innerHTML = '';
    ['cafe','almoco','jantar','lanche'].forEach(m=>{
      const mf = all.filter(f=>f.meal===m);
      if(!mf.length) return;
      const tot = mf.reduce((s,f)=>s+f.kcal,0);
      const div = document.createElement('div');
      div.className = 'meal-group';
      div.innerHTML = `
        <div class="meal-group-head">
          <div class="meal-group-name">
            <div class="meal-dot" style="background:${MEAL_COLORS[m]}"></div>
            ${MEAL_NAMES[m]}
          </div>
          <span class="meal-kcal">${Math.round(tot)} kcal</span>
        </div>
        <div class="food-list">${mf.map(foodHTML).join('')}</div>
      `;
      el.appendChild(div);
    });
  } else {
    el.innerHTML = foods.map(foodHTML).join('');
  }
}

function foodHTML(f){
  const icon = getFoodIcon(f.nome);
  return `
    <div class="food-item">
      <div class="food-icon">${icon}</div>
      <div class="food-body">
        <div class="food-name">${f.nome}</div>
        <div class="food-meta">${f.qty}${f.unit} &middot; P:${f.prot}g C:${f.carb}g G:${f.fat}g</div>
      </div>
      <div class="food-kcal">${Math.round(f.kcal)} kcal</div>
      <button class="del-btn" onclick="delFood(${f.id})" title="Remover"><i class="fas fa-times"></i></button>
    </div>
  `;
}

function getFoodIcon(n){
  n = (n||'').toLowerCase();
  if(n.includes('frango')||n.includes('galinha')) return '<i class="fas fa-drumstick-bite" style="color:#f59e0b"></i>';
  if(n.includes('carne')||n.includes('bife')||n.includes('picanha')||n.includes('baby beef')) return '<i class="fas fa-drumstick-bite" style="color:#ef4444"></i>';
  if(n.includes('peixe')||n.includes('atum')||n.includes('salmao')) return '<i class="fas fa-fish" style="color:#3b82f6"></i>';
  if(n.includes('ovo')) return '<i class="fas fa-egg" style="color:#f59e0b"></i>';
  if(n.includes('arroz')) return '<i class="fas fa-bowl-rice" style="color:#fde68a"></i>';
  if(n.includes('salada')||n.includes('alface')||n.includes('brocolis')) return '<i class="fas fa-leaf" style="color:#22c55e"></i>';
  if(n.includes('cafe')) return '<i class="fas fa-mug-hot" style="color:#92400e"></i>';
  if(n.includes('leite')||n.includes('iogurte')) return '<i class="fas fa-bottle-water" style="color:#bfdbfe"></i>';
  if(n.includes('pao')||n.includes('tapioca')||n.includes('aveia')) return '<i class="fas fa-bread-slice" style="color:#f59e0b"></i>';
  if(n.includes('banana')||n.includes('maca')||n.includes('fruta')) return '<i class="fas fa-apple-alt" style="color:#22c55e"></i>';
  if(n.includes('whey')||n.includes('proteina')) return '<i class="fas fa-dumbbell" style="color:#a855f7"></i>';
  if(n.includes('suco')||n.includes('agua')) return '<i class="fas fa-glass-water" style="color:#38bdf8"></i>';
  if(n.includes('batata')) return '<i class="fas fa-seedling" style="color:#f59e0b"></i>';
  return '<i class="fas fa-utensils" style="color:#9ca3af"></i>';
}

function updateStats(){
  const foods = S.log[TODAY] || [];
  const total = foods.reduce((s,f)=>s+f.kcal,0);
  const prot  = foods.reduce((s,f)=>s+f.prot,0);
  const carb  = foods.reduce((s,f)=>s+f.carb,0);
  const fat   = foods.reduce((s,f)=>s+f.fat,0);
  const meta  = S.meta;
  const rem   = Math.max(0, meta.kcal - total);
  const pct   = Math.min(100, total/meta.kcal*100);

  document.getElementById('sConsumed').textContent = Math.round(total);
  document.getElementById('sRemaining').textContent = Math.round(rem);
  document.getElementById('sItems').textContent = foods.length;

  // ring
  const circ = 2*Math.PI*60;
  const offset = circ*(1-pct/100);
  const ring = document.getElementById('ringFg');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = pct>100?'var(--red)':pct>85?'var(--yellow)':'var(--green)';
  document.getElementById('ringNum').textContent = Math.round(total);
  document.getElementById('ringNum').style.color = pct>100?'var(--red)':pct>85?'var(--yellow)':'var(--green)';
  document.getElementById('ringMeta').textContent = meta.kcal;

  // macros
  document.getElementById('mP').innerHTML = `${prot.toFixed(1)}g / <span id="mPMeta">${meta.prot}</span>g`;
  document.getElementById('mC').innerHTML = `${carb.toFixed(1)}g / <span id="mCMeta">${meta.carb}</span>g`;
  document.getElementById('mG').innerHTML = `${fat.toFixed(1)}g / <span id="mGMeta">${meta.fat}</span>g`;
  document.getElementById('bP').style.width = Math.min(100,prot/meta.prot*100)+'%';
  document.getElementById('bC').style.width = Math.min(100,carb/meta.carb*100)+'%';
  document.getElementById('bG').style.width = Math.min(100,fat/meta.fat*100)+'%';
}

function renderHistory(){
  const el = document.getElementById('histList');
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  const meta = S.meta.kcal;
  el.innerHTML = days.map(day=>{
    const foods = S.log[day]||[];
    const tot = foods.reduce((s,f)=>s+f.kcal,0);
    const pct = Math.min(100,tot/meta*100);
    const color = pct>100?'var(--red)':pct>85?'var(--yellow)':'var(--green)';
    const lbl = day===TODAY ? 'Hoje' :
      new Date(day+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    return `
      <div class="hist-item">
        <div class="hist-day">${lbl}</div>
        <div class="hist-bar"><div class="hist-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="hist-val" style="color:${color}">${Math.round(tot)}</div>
      </div>
    `;
  }).join('');
}

// ============================
// ADD / DELETE
// ============================
function addFood(){
  const nome = document.getElementById('fNome').value.trim();
  const qty  = parseFloat(document.getElementById('fQty').value)||100;
  const unit = document.getElementById('fUnit').value;
  const kcal = parseFloat(document.getElementById('fKcal').value)||0;
  const prot = parseFloat(document.getElementById('fP').value)||0;
  const carb = parseFloat(document.getElementById('fC').value)||0;
  const fat  = parseFloat(document.getElementById('fG').value)||0;
  const meal = document.getElementById('fMeal').value;

  if(!nome){ flash('fNome'); return; }
  if(!kcal){ flash('fKcal'); return; }

  const item = {id:Date.now(), nome, qty, unit, kcal, prot, carb, fat, meal};
  S.log[TODAY].push(item);

  // salvar na biblioteca se novo
  const allKnown = [...QUICK, ...S.custom];
  if(!allKnown.find(f=>f.n?.toLowerCase()===nome.toLowerCase()||f.nome?.toLowerCase()===nome.toLowerCase())){
    S.custom.push({nome, qty, unit, kcal, prot, carb, fat});
    setupAutofill();
  }

  save();
  clearForm();
  renderLog();
  updateStats();
  renderHistory();
  toast(`${nome} adicionado!`);
}

function delFood(id){
  S.log[TODAY] = S.log[TODAY].filter(f=>f.id!==id);
  save(); renderLog(); updateStats(); renderHistory();
}

function quickAdd(name){
  const f = QUICK.find(x=>x.n===name) || S.custom.find(x=>x.nome===name);
  if(!f) return;
  document.getElementById('fNome').value = f.n||f.nome;
  document.getElementById('fQty').value  = f.q||f.qty;
  document.getElementById('fUnit').value = f.u||f.unit||'g';
  document.getElementById('fKcal').value = f.kcal;
  document.getElementById('fP').value    = f.p||f.prot||0;
  document.getElementById('fC').value    = f.c||f.carb||0;
  document.getElementById('fG').value    = f.g||f.fat||0;
  document.getElementById('fNome').focus();
  // scroll to form on mobile
  document.getElementById('fNome').scrollIntoView({behavior:'smooth',block:'center'});
}

function clearForm(){
  ['fNome','fQty','fKcal','fP','fC','fG'].forEach(id=>document.getElementById(id).value='');
}

function flash(id){
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--red)';
  el.focus();
  setTimeout(()=>el.style.borderColor='',1800);
}

function setupAutofill(){
  const dl = document.getElementById('sugestoes');
  dl.innerHTML = '';
  const names = [...QUICK.map(f=>f.n), ...S.custom.map(f=>f.nome)];
  [...new Set(names)].forEach(n=>{
    const o = document.createElement('option'); o.value = n; dl.appendChild(o);
  });
}

// auto-fill ao selecionar da lista
document.getElementById('fNome').addEventListener('change', e=>{
  const name = e.target.value;
  const match = QUICK.find(f=>f.n===name) || S.custom.find(f=>f.nome===name);
  if(match){
    document.getElementById('fQty').value  = match.q||match.qty||100;
    document.getElementById('fUnit').value = match.u||match.unit||'g';
    document.getElementById('fKcal').value = match.kcal;
    document.getElementById('fP').value    = match.p||match.prot||0;
    document.getElementById('fC').value    = match.c||match.carb||0;
    document.getElementById('fG').value    = match.g||match.fat||0;
  }
});

// ============================
// TABS
// ============================
function setupTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      activeMeal = t.dataset.meal;
      renderLog();
    });
  });
}

// ============================
// META MODAL
// ============================
function abrirMeta(){
  document.getElementById('mKcal').value  = S.meta.kcal;
  document.getElementById('mProt').value  = S.meta.prot;
  document.getElementById('mCarb').value  = S.meta.carb;
  document.getElementById('mFat').value   = S.meta.fat;
  document.getElementById('mWater').value = S.meta.water;
  document.getElementById('overlay').classList.add('show');
}
function fecharMeta(e){
  if(!e || e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
}
function salvarMeta(){
  S.meta = {
    kcal:  parseInt(document.getElementById('mKcal').value)||2000,
    prot:  parseInt(document.getElementById('mProt').value)||150,
    carb:  parseInt(document.getElementById('mCarb').value)||250,
    fat:   parseInt(document.getElementById('mFat').value)||65,
    water: parseInt(document.getElementById('mWater').value)||8,
  };
  save();
  document.getElementById('overlay').classList.remove('show');
  updateStats(); renderWater(); renderHistory();
  toast('Meta salva!');
}

// ============================
// TOAST
// ============================
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

init();
</script>
